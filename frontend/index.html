<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css?v=20260327-02" />
</head>
<body>
  <!-- Vue root / Vue 根节点 -->
  <!-- Space shell needs a root class hook so the fixed viewport styles can engage when a specific space opens. / 空间壳层需要根节点 class 钩子，具体空间打开时才能启用固定视口样式。 -->
  <div
    id="app"
    class="app"
    :class="{ 'sidebar-collapsed': sidebarCollapsed, 'space-shell-mode': isSpaceShell }"
  >
    <landing-page v-if="!isLoggedIn" :app="appContext"></landing-page>

    <template v-else>
    <!-- Main navigation shell / 主导航壳层：空间页也保留，折叠时再切换到顶部导航。 -->
    <aside v-if="!sidebarCollapsed" class="sidebar">
      <div class="brand">
        <div class="brand-core">
          <div class="brand-mark">AS</div>
          <div>
            <div class="brand-title">Account Space</div>
            <div class="brand-sub">{{ t('brandSub') }}</div>
          </div>
        </div>
      </div>

      <nav class="nav">
        <!-- Navigation / 侧边导航 -->
        <button class="nav-item nav-item-control" type="button" @click="toggleSidebar" :aria-label="t('nav.collapse')">
          <span class="nav-icon">HD</span>
          <span class="nav-label">{{ t('nav.collapse') }}</span>
        </button>
        <button class="nav-item" data-icon="SV" :class="{active: view === 'services' || view === 'learning'}" :disabled="!isLoggedIn" @click="view = 'services'">
          <span class="nav-icon">SV</span>
          <span class="nav-label">{{ t('nav.services') }}</span>
        </button>
        <button
          v-if="isServiceOnline('admin') && String(user.level || '').toLowerCase() === 'admin'"
          class="nav-item"
          data-icon="AD"
          :class="{active: view === 'admin-panel'}"
          :disabled="!isLoggedIn"
          @click="openServiceSection('admin-panel')"
        >
          <span class="nav-icon">AD</span>
          <span class="nav-label">{{ t('nav.admin-panel') }}</span>
        </button>
        <button v-if="isServiceOnline('space')" class="nav-item" data-icon="SP" :class="{active: view === 'space'}" :disabled="!isLoggedIn" @click="enterSpaceShell()">
          <span class="nav-icon">SP</span>
          <span class="nav-label">{{ t('nav.space') }}</span>
        </button>
        <button class="nav-item" data-icon="FR" :class="{active: view === 'friends'}" :disabled="!isLoggedIn" @click="view = 'friends'">
          <span class="nav-icon-shell">
            <span class="nav-icon">FR</span>
            <span v-if="pendingFriendCount" class="nav-badge">{{ pendingFriendCount > 99 ? '99+' : pendingFriendCount }}</span>
          </span>
          <span class="nav-label">{{ t('nav.friends') }}</span>
        </button>
        <button v-if="isServiceOnline('message')" class="nav-item" data-icon="CH" :class="{active: view === 'chat'}" :disabled="!isLoggedIn" @click="view = 'chat'">
          <span class="nav-icon-shell">
            <span class="nav-icon">CH</span>
            <span v-if="unreadCount" class="nav-badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
          </span>
          <span class="nav-label">{{ t('nav.chat') }}</span>
        </button>
        <!-- Main-nav profile always opens the current user's own homepage / 主导航主页始终进入当前用户自己的主页。 -->
        <button class="nav-item" data-icon="ME" :class="{active: view === 'profile' && profileUser.id === user.id}" :disabled="!isLoggedIn || !user.id" @click="openMyProfile()">
          <span class="nav-icon">ME</span>
          <span class="nav-label">{{ t('nav.profile') }}</span>
        </button>
        <!-- Settings action now lives in the main menu / 设置入口现在放到主菜单里。 -->
        <settings-menu :app="appContext" class="nav-item-settings"></settings-menu>
      </nav>

      <!-- Account summary stays in the sidebar / 账号摘要保留在侧栏底部。 -->
      <div class="sidebar-account">
        <div class="sidebar-account-copy">
          <div class="sidebar-account-name">{{ user.name }}</div>
          <div class="sidebar-account-meta">{{ user.domain ? `@${user.domain}` : (user.username ? `@${user.username}` : user.id) }}</div>
          <div class="sidebar-account-meta">{{ localizedLevelName }}</div>
        </div>
      </div>

    </aside>

    <!-- Main content / 主内容 -->
    <!-- Space shell class keeps the main container fixed and lets the space page take over scrolling. / 空间壳层 class 让主容器固定在视口内，并由空间页接管滚动。 -->
    <main
      class="main"
      :class="{ 'chat-shell': view === 'chat', 'main-collapsed': sidebarCollapsed, 'space-shell': isSpaceShell }"
      :style="mainShellStyle"
    >
      <!-- Collapsed top navigation / 折叠态顶层导航：空间页在收起侧栏时也保留，方便继续切换页面。 -->
      <header v-if="sidebarCollapsed" class="topnav-shell">
        <!-- Refined nav trigger / 精修导航触发器：改为纯图标入口，让折叠态顶部导航更紧凑。 -->
        <button class="topnav-toggle ghost" type="button" @click="toggleSidebar" :aria-label="t('nav.expand')">
          <span class="topnav-toggle-core" aria-hidden="true">
            <span class="topnav-toggle-icon-shell">
              <span class="nav-toggle-icon"></span>
            </span>
          </span>
          <span class="topnav-toggle-accent" aria-hidden="true"></span>
        </button>
        <nav class="topnav-strip" aria-label="Primary navigation">
          <!-- Keep the current nav state when entering the space workspace from the compact top nav / 从折叠顶层导航进入空间工作台时保持当前导航状态。 -->
          <button class="nav-item topnav-item" data-icon="SV" :class="{active: view === 'services' || view === 'learning'}" :disabled="!isLoggedIn" @click="view = 'services'">
            <span class="nav-icon">SV</span>
            <span class="nav-label">{{ t('nav.services') }}</span>
          </button>
          <button
            v-if="isServiceOnline('admin') && String(user.level || '').toLowerCase() === 'admin'"
            class="nav-item topnav-item"
            data-icon="AD"
            :class="{active: view === 'admin-panel'}"
            :disabled="!isLoggedIn"
            @click="openServiceSection('admin-panel')"
          >
            <span class="nav-icon">AD</span>
            <span class="nav-label">{{ t('nav.admin-panel') }}</span>
          </button>
          <button v-if="isServiceOnline('space')" class="nav-item topnav-item" data-icon="SP" :class="{active: view === 'space'}" :disabled="!isLoggedIn" @click="enterSpaceShell()">
            <span class="nav-icon">SP</span>
            <span class="nav-label">{{ t('nav.space') }}</span>
          </button>
          <button class="nav-item topnav-item" data-icon="FR" :class="{active: view === 'friends'}" :disabled="!isLoggedIn" @click="view = 'friends'">
            <span class="nav-icon-shell">
              <span class="nav-icon">FR</span>
              <span v-if="pendingFriendCount" class="nav-badge">{{ pendingFriendCount > 99 ? '99+' : pendingFriendCount }}</span>
            </span>
            <span class="nav-label">{{ t('nav.friends') }}</span>
          </button>
          <button v-if="isServiceOnline('message')" class="nav-item topnav-item" data-icon="CH" :class="{active: view === 'chat'}" :disabled="!isLoggedIn" @click="view = 'chat'">
            <span class="nav-icon-shell">
              <span class="nav-icon">CH</span>
              <span v-if="unreadCount" class="nav-badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
            </span>
            <span class="nav-label">{{ t('nav.chat') }}</span>
          </button>
          <button class="nav-item topnav-item" data-icon="ME" :class="{active: view === 'profile' && profileUser.id === user.id}" :disabled="!isLoggedIn || !user.id" @click="openMyProfile()">
            <span class="nav-icon">ME</span>
            <span class="nav-label">{{ t('nav.profile') }}</span>
          </button>
        </nav>
      </header>

      <div v-if="flashMessage" class="banner banner-success">{{ flashMessage }}</div>
      <div v-if="errorMessage" class="banner banner-error">{{ errorMessage }}</div>

      <!-- Space header / 空间头部：仅在进入具体空间时显示工作台入口。 -->
      <header v-if="isSpaceShell" class="topbar space-topbar">
        <div class="space-topbar-left">
          <button class="ghost compact" type="button" @click="leaveSpaceShell">{{ t('spaces.backAction') }}</button>
          <div>
            <div class="page-title">{{ pageTitle }}</div>
          </div>
        </div>
        <div class="space-topbar-actions">
          <!-- Space workspace menu / 空间工作台菜单：进入具体空间后收进顶部按钮。 -->
          <bilingual-action-button
            variant="tonal"
            compact
            type="button"
            :primary-label="t('spaces.workspaceTitle')"
            :secondary-label="peerLocaleText('spaces.workspaceTitle')"
            @click="toggleSpaceWorkspaceMenu"
          ></bilingual-action-button>
          <div v-if="user && currentSpace && currentSpace.userId === user.id" class="space-toolbar-actions">
            <bilingual-action-button
              variant="ghost"
              type="button"
              :primary-label="t('spaces.settingsAction')"
              :secondary-label="peerLocaleText('spaces.settingsAction')"
              @click="openSpaceEditor(currentSpace)"
            ></bilingual-action-button>
            <bilingual-action-button
              variant="ghost"
              type="button"
              :primary-label="t('posts.publishAction')"
              :secondary-label="peerLocaleText('posts.publishAction')"
              @click="openPostComposer(currentSpace)"
            ></bilingual-action-button>
            <bilingual-action-button
              variant="ghost"
              danger
              type="button"
              :primary-label="t('spaces.deleteAction')"
              :secondary-label="peerLocaleText('spaces.deleteAction')"
              @click="deleteSpace(currentSpace)"
            ></bilingual-action-button>
          </div>
        </div>
      </header>

      <div v-if="!isSpaceShell && (pendingFriendCount > 0 || unreadCount > 0)" class="floating-reminder">
        <div class="floating-reminder-head">
          <div class="floating-reminder-copy">
            <div class="floating-reminder-title">
              {{ topPendingFriend ? topPendingFriend.name : t('chat.title') }}
            </div>
            <div v-if="topPendingFriend" class="floating-reminder-sub">
              {{ topPendingFriend.secondary }} · {{ t('friends.directionIncoming') }}
            </div>
            <div v-if="topPendingFriend && unreadCount > 0" class="floating-reminder-sub">
              {{ unreadCount }} {{ t('ws.unreadLabel') }}
            </div>
            <div v-else-if="!topPendingFriend && unreadCount > 0" class="floating-reminder-sub">
              {{ unreadCount }} {{ t('ws.unreadLabel') }}
            </div>
          </div>
          <div class="floating-reminder-pill">
            {{ topPendingFriend ? pendingFriendCount : unreadCount }}
          </div>
        </div>
        <div class="floating-reminder-actions">
          <button v-if="pendingFriendCount > 0" class="ghost compact" type="button" @click="view = 'friends'">{{ t('nav.friends') }}</button>
          <button v-if="unreadCount > 0" class="primary compact" type="button" @click="view = 'chat'">{{ t('nav.chat') }}</button>
        </div>
      </div>

      <!-- Service navigation / 服务导航：抽成独立组件，避免根模板继续膨胀。 -->
      <service-navigation v-if="view === 'services'" :app="appContext"></service-navigation>
      <site-admin-panel v-if="view === 'admin-panel'" :app="appContext"></site-admin-panel>
      <microservice-admin-console v-if="view === 'account-admin'" :app="appContext" workspace-key="account-admin"></microservice-admin-console>
      <microservice-admin-console v-if="view === 'space-admin'" :app="appContext" workspace-key="space-admin"></microservice-admin-console>
      <microservice-admin-console v-if="view === 'message-admin'" :app="appContext" workspace-key="message-admin"></microservice-admin-console>
      <learning-service v-if="view === 'learning'" :app="appContext"></learning-service>
      <learning-service v-if="view === 'learning-admin'" :app="appContext" :admin-workspace-only="true"></learning-service>

      <!-- Identity editor / 身份编辑器：继续保持为独立浮层组件。 -->
      <profile-identity-editor :app="appContext"></profile-identity-editor>
      <div v-if="false" class="modal-backdrop modal-backdrop--sheet" @click.self="closeIdentityEditor">
        <div class="modal modal--sheet profile-editor-modal">
          <div class="modal-header">
            <div>
              <div class="space-toolbar-kicker">{{ t('profile.identity.title') }}</div>
              <div class="modal-title">{{ profileEditorTitle(identityEditorSection) }}</div>
            </div>
            <button class="ghost compact" type="button" @click="closeIdentityEditor">×</button>
          </div>
          <form class="form modal-form" @submit.prevent="saveProfile">
            <div class="panel-grid identity-editor-grid">
              <!-- Personal info editor / 个人资料编辑区：只保留身份相关字段。 -->
              <div v-if="identityEditorSection === 'personal'" class="panel accent identity-editor-card">
                <h3>{{ t('profile.identity.personalTitle') }}</h3>
                <p>{{ t('profile.identity.personalSub') }}</p>
                <bilingual-field
                  :primary-label="t('profile.identity.nickname')"
                  :secondary-label="peerLocaleText('profile.identity.nickname')"
                >
                  <input type="text" :placeholder="t('dashboard.displayNamePlaceholder')" v-model="profileDraft.displayName" />
                </bilingual-field>
                <bilingual-field
                  :primary-label="t('profile.identity.username')"
                  :secondary-label="peerLocaleText('profile.identity.username')"
                  :helper-text="t('dashboard.usernameHint')"
                >
                  <!-- Username field / 用户名字段：用于个人主页和二级域名入口。 -->
                  <input type="text" :placeholder="t('dashboard.usernamePlaceholder')" v-model="profileDraft.username" maxlength="63" autocomplete="username" />
                </bilingual-field>
                <bilingual-field
                  :primary-label="t('profile.identity.domain')"
                  :secondary-label="peerLocaleText('profile.identity.domain')"
                  :helper-text="t('profile.identity.domainHint')"
                >
                  <input type="text" :placeholder="t('profile.identity.domainPlaceholder')" v-model="profileDraft.domain" maxlength="63" autocomplete="username" />
                </bilingual-field>
                <bilingual-field
                  :primary-label="t('profile.identity.avatarLabel')"
                  :secondary-label="peerLocaleText('profile.identity.avatarLabel')"
                  :helper-text="t('profile.identity.avatarHint')"
                >
                  <input type="url" :placeholder="t('profile.identity.avatarPlaceholder')" v-model="profileDraft.avatarUrl" autocomplete="off" />
                </bilingual-field>
                <div class="identity-avatar-editor">
                  <div class="avatar large profile-avatar" :style="profileAvatarStyle(profileDraft.avatarUrl)">
                    <span v-if="!profileDraft.avatarUrl">{{ profileAvatarInitials(profileDraft.displayName || user.name) }}</span>
                  </div>
                  <div class="identity-avatar-copy">
                    <strong>{{ t('profile.identity.avatarLabel') }}</strong>
                    <span>{{ t('profile.identity.avatarHint') }}</span>
                  </div>
                </div>
                <bilingual-field
                  :primary-label="t('profile.identity.signature')"
                  :secondary-label="peerLocaleText('profile.identity.signature')"
                >
                  <textarea class="post-textarea" :placeholder="t('profile.identity.signaturePlaceholder')" v-model="profileDraft.signature"></textarea>
                </bilingual-field>
              </div>

              <!-- Contact info editor / 联系方式编辑区：邮箱和手机号作为只读账号资料展示，出生日期与性别继续单独编辑。 -->
              <div v-else-if="identityEditorSection === 'contact'" class="panel accent identity-editor-card">
                <h3>{{ t('profile.identity.contactTitle') }}</h3>
                <p>{{ t('profile.identity.contactSub') }}</p>
                <bilingual-field
                  :primary-label="t('profile.identity.emailLabel')"
                  :secondary-label="peerLocaleText('profile.identity.emailLabel')"
                >
                  <input
                    type="email"
                    :value="profileUser.email || t('common.notAvailable')"
                    readonly
                    autocomplete="email"
                  />
                </bilingual-field>
                <bilingual-field
                  :primary-label="t('profile.identity.phoneLabel')"
                  :secondary-label="peerLocaleText('profile.identity.phoneLabel')"
                >
                  <input
                    type="tel"
                    :value="profileUser.phone || t('common.notAvailable')"
                    readonly
                    autocomplete="tel"
                  />
                </bilingual-field>
                <p>{{ t('profile.identity.contactNote') }}</p>
                <bilingual-field
                  :primary-label="t('profile.identity.birthDateLabel')"
                  :secondary-label="peerLocaleText('profile.identity.birthDateLabel')"
                >
                  <input
                    type="date"
                    :placeholder="t('profile.identity.birthDatePlaceholder')"
                    v-model="profileDraft.birthDate"
                    autocomplete="off"
                  />
                </bilingual-field>
                <div class="identity-derived-grid">
                  <div class="identity-summary-item">
                    <span>{{ t('profile.identity.birthdayLabel') }}</span>
                    <strong>{{ profileBirthdayFromBirthDate(profileDraft.birthDate) }}</strong>
                  </div>
                  <div class="identity-summary-item">
                    <span>{{ t('profile.identity.ageLabel') }}</span>
                    <strong>{{ profileAgeFromBirthDate(profileDraft.birthDate) }}</strong>
                  </div>
                </div>
                <bilingual-field
                  :primary-label="t('profile.identity.genderLabel')"
                  :secondary-label="peerLocaleText('profile.identity.genderLabel')"
                >
                  <input
                    type="text"
                    :placeholder="t('profile.identity.genderPlaceholder')"
                    v-model="profileDraft.gender"
                    autocomplete="off"
                  />
                </bilingual-field>
              </div>

              <!-- Privacy editor / 隐私设置区：仅保留可见范围开关。 -->
              <div v-else class="panel identity-editor-card">
                <h3>{{ t('profile.identity.privacyTitle') }}</h3>
                <p>{{ t('profile.identity.privacySub') }}</p>
                <div class="identity-visibility-grid identity-editor-privacy-grid">
                  <bilingual-select-field
                    :primary-label="t('profile.identity.phoneVisibility')"
                    :secondary-label="peerLocaleText('profile.identity.phoneVisibility')"
                    v-model="profileDraft.phoneVisibility"
                    :options="identityVisibilityOptions()"
                  ></bilingual-select-field>
                  <bilingual-select-field
                    :primary-label="t('profile.identity.emailVisibility')"
                    :secondary-label="peerLocaleText('profile.identity.emailVisibility')"
                    v-model="profileDraft.emailVisibility"
                    :options="identityVisibilityOptions()"
                  ></bilingual-select-field>
                  <bilingual-select-field
                    :primary-label="t('profile.identity.ageVisibility')"
                    :secondary-label="peerLocaleText('profile.identity.ageVisibility')"
                    v-model="profileDraft.ageVisibility"
                    :options="identityVisibilityOptions()"
                  ></bilingual-select-field>
                  <bilingual-select-field
                    :primary-label="t('profile.identity.genderVisibility')"
                    :secondary-label="peerLocaleText('profile.identity.genderVisibility')"
                    v-model="profileDraft.genderVisibility"
                    :options="identityVisibilityOptions()"
                  ></bilingual-select-field>
                </div>
              </div>
            </div>
            <div class="modal-actions">
              <button class="ghost" type="button" @click="closeIdentityEditor">{{ t('common.cancel') }}</button>
              <button class="primary" type="submit">{{ t(profileEditorSaveKey(identityEditorSection)) }}</button>
            </div>
          </form>
        </div>
      </div>

      <section v-if="false" class="panel">
        <h2>{{ t('spaces.privateTitle') }}</h2>
        <p>{{ t('spaces.privateSub') }}</p>
        <div class="space-toolbar">
          <div>
            <div class="space-toolbar-kicker">{{ t('spaces.currentLabel') }}</div>
            <div class="space-toolbar-title">
              {{ activePrivateSpace ? localizedSpaceText('name', activePrivateSpace) : t('common.notAvailable') }}
            </div>
            <div class="space-toolbar-sub">
              {{ activePrivateSpace ? spaceVisibilityLabel(activePrivateSpace.visibility) : t('posts.spaceRequired') }}
            </div>
          </div>
          <div class="space-toolbar-actions">
            <bilingual-action-button
              variant="ghost"
              type="button"
              :primary-label="t('spaces.createAction')"
              :secondary-label="peerLocaleText('spaces.createAction')"
              @click="openSpaceComposer('private')"
            ></bilingual-action-button>
            <bilingual-action-button
              variant="primary"
              type="button"
              :primary-label="t('posts.publishAction')"
              :secondary-label="peerLocaleText('posts.publishAction')"
              @click="openPostComposer('private')"
            ></bilingual-action-button>
          </div>
        </div>
        <div class="space-cards">
          <div
            class="space-card"
            :class="{ active: activePrivateSpace && space.id === activePrivateSpace.id }"
            v-for="space in privateSpaces"
            :key="space.id"
          >
            <div class="space-tag private">{{ t('spaces.type.private') }}</div>
            <div v-if="activePrivateSpace && space.id === activePrivateSpace.id" class="space-badge">
              {{ t('spaces.currentLabel') }}
            </div>
            <div class="space-title">{{ localizedSpaceText('name', space) }}</div>
            <div class="space-desc">{{ localizedSpaceText('desc', space) }}</div>
            <div class="space-meta">{{ spaceVisibilityLabel(space.visibility) }}</div>
            <div class="space-meta">@{{ space.subdomain }}</div>
            <div v-if="space.status && space.status !== 'active'" class="space-meta">{{ statusLabel(space.status) }}</div>
            <div class="space-card-actions">
              <bilingual-action-button
                variant="ghost"
                compact
                type="button"
                :primary-label="t('spaces.enterAction')"
                :secondary-label="peerLocaleText('spaces.enterAction')"
                @click="enterSpace(space)"
              ></bilingual-action-button>
              <bilingual-action-button
                v-if="user && space.userId === user.id"
                variant="ghost"
                compact
                type="button"
                :primary-label="t('spaces.editAction')"
                :secondary-label="peerLocaleText('spaces.editAction')"
                @click="openSpaceEditor(space)"
              ></bilingual-action-button>
              <bilingual-action-button
                v-if="user && space.userId === user.id"
                variant="ghost"
                compact
                danger
                type="button"
                :primary-label="t('spaces.deleteAction')"
                :secondary-label="peerLocaleText('spaces.deleteAction')"
                @click="deleteSpace(space)"
              ></bilingual-action-button>
            </div>
          </div>
        </div>
        <div v-if="false" class="post-feed">
          <div class="post-composer">
            <h3>{{ t('posts.privateFeedTitle') }}</h3>
            <p>{{ t('posts.privateFeedSub') }}</p>
          </div>
          <div v-if="visiblePrivatePosts.length === 0" class="empty-state">{{ t('posts.privateEmpty') }}</div>
          <article class="post-card" v-for="post in visiblePrivatePosts" :key="post.id">
            <div class="post-header">
              <div>
                <div class="post-author">{{ post.authorName }}</div>
                <div class="post-meta">{{ t('posts.spaceLabel') }} · {{ post.spaceLabel }}</div>
                <div class="post-meta">{{ visibilityLabel(post.visibility) }} · {{ formatDateTime(post.createdAt) }}</div>
              </div>
            </div>
            <div class="post-title">{{ post.title }}</div>
            <bilingual-action-button
              variant="ghost"
              compact
              type="button"
              :primary-label="t('posts.openDetail')"
              :secondary-label="peerLocaleText('posts.openDetail')"
              @click="openPostDetail(post.id)"
            ></bilingual-action-button>
            <div v-if="post.mediaItems && post.mediaItems.length > 1" class="post-media-gallery">
              <div
                v-for="(mediaItem, index) in post.mediaItems"
                :key="`${post.id}-media-${index}`"
                class="post-media-gallery-item"
              >
                <button
                  v-if="mediaItem.mediaType === 'image'"
                  class="post-media-image-trigger"
                  type="button"
