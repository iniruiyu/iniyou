<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <!-- Vue root / Vue 根节点 -->
  <div
    id="app"
    class="app"
    :class="{ 'sidebar-collapsed': sidebarCollapsed, 'space-shell-mode': isSpaceShell }"
  >
    <landing-page v-if="!isLoggedIn" :app="appContext"></landing-page>

    <template v-else>
    <!-- Main navigation shell / 主导航壳层：进入空间页时不渲染。 -->
    <aside v-if="!isSpaceShell && !sidebarCollapsed" class="sidebar">
      <div class="brand">
        <div class="brand-core">
          <div class="brand-mark">AS</div>
          <div>
            <div class="brand-title">Account Space</div>
            <div class="brand-sub">{{ t('brandSub') }}</div>
          </div>
        </div>
      </div>

      <nav class="nav">
        <!-- Navigation / 侧边导航 -->
        <button class="nav-item nav-item-control" type="button" @click="toggleSidebar" :aria-label="t('nav.collapse')">
          <span class="nav-icon">HD</span>
          <span class="nav-label">{{ t('nav.collapse') }}</span>
        </button>
        <button class="nav-item" data-icon="DB" :class="{active: view === 'dashboard'}" :disabled="!isLoggedIn" @click="view = 'dashboard'">
          <span class="nav-icon">DB</span>
          <span class="nav-label">{{ t('nav.dashboard') }}</span>
        </button>
        <button class="nav-item" data-icon="SP" :class="{active: view === 'space'}" :disabled="!isLoggedIn" @click="enterSpaceShell">
          <span class="nav-icon">SP</span>
          <span class="nav-label">{{ t('nav.space') }}</span>
        </button>
        <button class="nav-item" data-icon="FR" :class="{active: view === 'friends'}" :disabled="!isLoggedIn" @click="view = 'friends'">
          <span class="nav-icon-shell">
            <span class="nav-icon">FR</span>
            <span v-if="pendingFriendCount" class="nav-badge">{{ pendingFriendCount > 99 ? '99+' : pendingFriendCount }}</span>
          </span>
          <span class="nav-label">{{ t('nav.friends') }}</span>
        </button>
        <button class="nav-item" data-icon="CH" :class="{active: view === 'chat'}" :disabled="!isLoggedIn" @click="view = 'chat'">
          <span class="nav-icon-shell">
            <span class="nav-icon">CH</span>
            <span v-if="unreadCount" class="nav-badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
          </span>
          <span class="nav-label">{{ t('nav.chat') }}</span>
        </button>
        <button class="nav-item" data-icon="ME" :class="{active: view === 'profile'}" :disabled="!isLoggedIn || !profileUser.id" @click="view = 'profile'">
          <span class="nav-icon">ME</span>
          <span class="nav-label">{{ t('nav.profile') }}</span>
        </button>
      </nav>

      <div class="sidebar-foot">
        <div class="status">
          <span class="dot"></span>
          <span>{{ t('ws.statusLabel') }}: {{ wsStatusText }}</span>
        </div>
        <div class="status">
          <span>{{ t('ws.unreadLabel') }}: {{ unreadCount }}</span>
        </div>
        <button class="primary" @click="ws ? disconnectWs() : connectWs()">{{ ws ? t('ws.disconnect') : t('ws.connect') }}</button>
      </div>
    </aside>

    <button v-if="!isSpaceShell && sidebarCollapsed" class="sidebar-fab ghost" type="button" @click="toggleSidebar" :aria-label="t('nav.expand')">
      <span class="nav-toggle-icon" aria-hidden="true"></span>
      <span class="sidebar-fab-label">{{ t('nav.expand') }}</span>
    </button>

    <!-- Main content / 主内容 -->
    <main class="main" :class="{ 'chat-shell': view === 'chat', 'space-shell': isSpaceShell }">
      <header v-if="!isSpaceShell" class="topbar">
        <div v-if="view !== 'friends' && view !== 'chat'">
          <div class="page-title">{{ pageTitle }}</div>
          <div class="page-sub">{{ pageSub }}</div>
        </div>
        <div class="topbar-actions">
          <div class="profile">
            <div class="avatar"></div>
            <div>
              <div class="profile-name">{{ user.name }}</div>
              <div class="profile-level">{{ user.domain ? `@${user.domain}` : (user.username ? `@${user.username}` : user.id) }}</div>
              <div class="profile-level">{{ localizedLevelName }} · {{ localizedPlan }}</div>
            </div>
            <settings-menu :app="appContext"></settings-menu>
            <button v-if="isLoggedIn" class="ghost compact" @click="logout">{{ t('auth.logout') }}</button>
          </div>
        </div>
      </header>

      <div v-if="flashMessage" class="banner banner-success">{{ flashMessage }}</div>
      <div v-if="errorMessage" class="banner banner-error">{{ errorMessage }}</div>

      <!-- Space header / 空间头部：仅在进入空间页时显示。 -->
      <header v-if="isSpaceShell" class="topbar space-topbar">
        <div class="space-topbar-left">
          <button class="ghost compact" type="button" @click="leaveSpaceShell">{{ t('spaces.backAction') }}</button>
          <div>
            <div class="page-title">{{ pageTitle }}</div>
          </div>
        </div>
        <div class="space-topbar-actions">
          <div v-if="user && currentSpace && currentSpace.userId === user.id" class="space-toolbar-actions">
            <bilingual-action-button
              variant="ghost"
              type="button"
              :primary-label="t('spaces.settingsAction')"
              :secondary-label="peerLocaleText('spaces.settingsAction')"
              @click="openSpaceEditor(currentSpace)"
            ></bilingual-action-button>
            <bilingual-action-button
              variant="ghost"
              type="button"
              :primary-label="t('posts.publishAction')"
              :secondary-label="peerLocaleText('posts.publishAction')"
              @click="openPostComposer(currentSpace)"
            ></bilingual-action-button>
            <bilingual-action-button
              variant="ghost"
              danger
              type="button"
              :primary-label="t('spaces.deleteAction')"
              :secondary-label="peerLocaleText('spaces.deleteAction')"
              @click="deleteSpace(currentSpace)"
            ></bilingual-action-button>
          </div>
        </div>
      </header>

      <div v-if="!isSpaceShell && (pendingFriendCount > 0 || unreadCount > 0)" class="floating-reminder">
        <div class="floating-reminder-head">
          <div class="floating-reminder-copy">
            <div class="floating-reminder-title">
              {{ topPendingFriend ? topPendingFriend.name : t('chat.title') }}
            </div>
            <div v-if="topPendingFriend" class="floating-reminder-sub">
              {{ topPendingFriend.secondary }} · {{ t('friends.directionIncoming') }}
            </div>
            <div v-if="topPendingFriend && unreadCount > 0" class="floating-reminder-sub">
              {{ unreadCount }} {{ t('ws.unreadLabel') }}
            </div>
            <div v-else-if="!topPendingFriend && unreadCount > 0" class="floating-reminder-sub">
              {{ unreadCount }} {{ t('ws.unreadLabel') }}
            </div>
          </div>
          <div class="floating-reminder-pill">
            {{ topPendingFriend ? pendingFriendCount : unreadCount }}
          </div>
        </div>
        <div class="floating-reminder-actions">
          <button v-if="pendingFriendCount > 0" class="ghost compact" type="button" @click="view = 'friends'">{{ t('nav.friends') }}</button>
          <button v-if="unreadCount > 0" class="primary compact" type="button" @click="view = 'chat'">{{ t('nav.chat') }}</button>
        </div>
      </div>

      <section v-if="view === 'dashboard'" class="panel-grid">
        <div class="panel">
          <h2>{{ t('dashboard.overviewTitle') }}</h2>
          <p>{{ t('dashboard.overviewSub') }}</p>
          <div class="stats">
            <div class="stat">
              <div class="stat-title">{{ t('dashboard.levelStat') }}</div>
              <div class="stat-value">{{ localizedLevelName }}</div>
            </div>
            <div class="stat">
              <div class="stat-title">{{ t('dashboard.planStat') }}</div>
              <div class="stat-value">{{ localizedPlan }}</div>
            </div>
            <div class="stat">
              <div class="stat-title">{{ t('dashboard.friendStat') }}</div>
              <div class="stat-value">{{ acceptedFriends.length }}</div>
            </div>
            <div class="stat">
              <div class="stat-title">{{ t('dashboard.blockchainStat') }}</div>
              <div class="stat-value">{{ activeExternalAccounts.length }}</div>
            </div>
          </div>
        </div>
        <div class="panel">
          <h2>{{ t('profile.identity.title') }}</h2>
          <p>{{ t('profile.identity.sub') }}</p>
          <form class="form identity-form">
            <!-- Bilingual identity fields / 双语身份字段：每个字段复用同一组件，避免布局和文案规则在多处复制。 -->
            <bilingual-field
              :primary-label="t('profile.identity.nickname')"
              :secondary-label="peerLocaleText('profile.identity.nickname')"
            >
              <input type="text" :placeholder="t('dashboard.displayNamePlaceholder')" v-model="profileDraft.displayName" />
            </bilingual-field>
            <bilingual-field
              :primary-label="t('profile.identity.username')"
              :secondary-label="peerLocaleText('profile.identity.username')"
              :helper-text="t('dashboard.usernameHint')"
            >
              <!-- Username field / 用户名字段：用于个人主页和二级域名入口。 -->
              <input type="text" :placeholder="t('dashboard.usernamePlaceholder')" v-model="profileDraft.username" maxlength="63" autocomplete="username" />
            </bilingual-field>
            <bilingual-field
              :primary-label="t('profile.identity.domain')"
              :secondary-label="peerLocaleText('profile.identity.domain')"
              :helper-text="t('profile.identity.domainHint')"
            >
              <input type="text" :placeholder="t('profile.identity.domainPlaceholder')" v-model="profileDraft.domain" maxlength="63" autocomplete="username" />
            </bilingual-field>
            <bilingual-field
              :primary-label="t('profile.identity.signature')"
              :secondary-label="peerLocaleText('profile.identity.signature')"
            >
              <textarea class="post-textarea" :placeholder="t('profile.identity.signaturePlaceholder')" v-model="profileDraft.signature"></textarea>
            </bilingual-field>
            <div class="identity-visibility-grid">
              <bilingual-select-field
                :primary-label="t('profile.identity.phoneVisibility')"
                :secondary-label="peerLocaleText('profile.identity.phoneVisibility')"
                v-model="profileDraft.phoneVisibility"
                :options="identityVisibilityOptions()"
              ></bilingual-select-field>
              <bilingual-select-field
                :primary-label="t('profile.identity.emailVisibility')"
                :secondary-label="peerLocaleText('profile.identity.emailVisibility')"
                v-model="profileDraft.emailVisibility"
                :options="identityVisibilityOptions()"
              ></bilingual-select-field>
              <bilingual-select-field
                :primary-label="t('profile.identity.ageVisibility')"
                :secondary-label="peerLocaleText('profile.identity.ageVisibility')"
                v-model="profileDraft.ageVisibility"
                :options="identityVisibilityOptions()"
              ></bilingual-select-field>
              <bilingual-select-field
                :primary-label="t('profile.identity.genderVisibility')"
                :secondary-label="peerLocaleText('profile.identity.genderVisibility')"
                v-model="profileDraft.genderVisibility"
                :options="identityVisibilityOptions()"
              ></bilingual-select-field>
            </div>
            <bilingual-action-button
              variant="primary"
              type="button"
              :primary-label="t('profile.identity.save')"
              :secondary-label="peerLocaleText('profile.identity.save')"
              @click="saveProfile"
            ></bilingual-action-button>
          </form>
        </div>
        <div class="panel">
          <h2>{{ t('dashboard.blockchainTitle') }}</h2>
          <p>{{ t('dashboard.blockchainSub') }}</p>
          <div class="subscription">
            <div>
              <div class="subscription-title">{{ t('dashboard.blockchainStat') }}: {{ activeExternalAccounts.length }}</div>
              <div class="subscription-sub">{{ t('blockchain.connectedChains') }}: {{ connectedChainText }}</div>
            </div>
            <bilingual-action-button
              variant="primary"
              type="button"
              :primary-label="t('blockchain.openManager')"
              :secondary-label="peerLocaleText('blockchain.openManager')"
              @click="openProfileTab('blockchain')"
            ></bilingual-action-button>
          </div>
        </div>
      </section>

      <section v-if="false" class="panel">
        <h2>{{ t('spaces.privateTitle') }}</h2>
        <p>{{ t('spaces.privateSub') }}</p>
        <div class="space-toolbar">
          <div>
            <div class="space-toolbar-kicker">{{ t('spaces.currentLabel') }}</div>
            <div class="space-toolbar-title">
              {{ activePrivateSpace ? localizedSpaceText('name', activePrivateSpace) : t('common.notAvailable') }}
            </div>
            <div class="space-toolbar-sub">
              {{ activePrivateSpace ? spaceVisibilityLabel(activePrivateSpace.visibility) : t('posts.spaceRequired') }}
            </div>
          </div>
          <div class="space-toolbar-actions">
            <bilingual-action-button
              variant="ghost"
              type="button"
              :primary-label="t('spaces.createAction')"
              :secondary-label="peerLocaleText('spaces.createAction')"
              @click="openSpaceComposer('private')"
            ></bilingual-action-button>
            <bilingual-action-button
              variant="primary"
              type="button"
              :primary-label="t('posts.publishAction')"
              :secondary-label="peerLocaleText('posts.publishAction')"
              @click="openPostComposer('private')"
            ></bilingual-action-button>
          </div>
        </div>
        <div class="space-cards">
          <div
            class="space-card"
            :class="{ active: activePrivateSpace && space.id === activePrivateSpace.id }"
            v-for="space in privateSpaces"
            :key="space.id"
          >
            <div class="space-tag private">{{ t('spaces.type.private') }}</div>
            <div v-if="activePrivateSpace && space.id === activePrivateSpace.id" class="space-badge">
              {{ t('spaces.currentLabel') }}
            </div>
            <div class="space-title">{{ localizedSpaceText('name', space) }}</div>
            <div class="space-desc">{{ localizedSpaceText('desc', space) }}</div>
            <div class="space-meta">{{ spaceVisibilityLabel(space.visibility) }}</div>
            <div class="space-meta">@{{ space.subdomain }}</div>
            <div v-if="space.status && space.status !== 'active'" class="space-meta">{{ statusLabel(space.status) }}</div>
            <div class="space-card-actions">
              <bilingual-action-button
                variant="ghost"
                compact
                type="button"
                :primary-label="t('spaces.enterAction')"
                :secondary-label="peerLocaleText('spaces.enterAction')"
                @click="enterSpace(space)"
              ></bilingual-action-button>
              <bilingual-action-button
                v-if="user && space.userId === user.id"
                variant="ghost"
                compact
                type="button"
                :primary-label="t('spaces.editAction')"
                :secondary-label="peerLocaleText('spaces.editAction')"
                @click="openSpaceEditor(space)"
              ></bilingual-action-button>
              <bilingual-action-button
                v-if="user && space.userId === user.id"
                variant="ghost"
                compact
                danger
                type="button"
                :primary-label="t('spaces.deleteAction')"
                :secondary-label="peerLocaleText('spaces.deleteAction')"
                @click="deleteSpace(space)"
              ></bilingual-action-button>
            </div>
          </div>
        </div>
        <div class="post-feed">
          <div class="post-composer">
            <h3>{{ t('posts.privateFeedTitle') }}</h3>
            <p>{{ t('posts.privateFeedSub') }}</p>
          </div>
          <div v-if="visiblePrivatePosts.length === 0" class="empty-state">{{ t('posts.privateEmpty') }}</div>
          <article class="post-card" v-for="post in visiblePrivatePosts" :key="post.id">
            <div class="post-header">
              <div>
                <div class="post-author">{{ post.authorName }}</div>
                <div class="post-meta">{{ t('posts.spaceLabel') }} · {{ post.spaceLabel }}</div>
                <div class="post-meta">{{ visibilityLabel(post.visibility) }} · {{ formatDateTime(post.createdAt) }}</div>
              </div>
            </div>
            <div class="post-title">{{ post.title }}</div>
            <bilingual-action-button
              variant="ghost"
              compact
              type="button"
              :primary-label="t('posts.openDetail')"
              :secondary-label="peerLocaleText('posts.openDetail')"
              @click="openPostDetail(post.id)"
            ></bilingual-action-button>
            <div v-if="post.mediaUrl" class="post-media-preview">
              <img
                v-if="post.mediaType === 'image'"
                :src="post.mediaUrl"
                :alt="post.mediaName || post.title"
              />
              <video
                v-else-if="post.mediaType === 'video'"
                :src="post.mediaUrl"
                controls
              ></video>
              <div v-else class="post-media-card">
                <div class="post-media-title">{{ post.mediaName || t('posts.mediaPreview') }}</div>
                <div class="post-media-sub">{{ post.mediaMime || post.mediaType }}</div>
              </div>
            </div>
            <div class="post-content">{{ post.content }}</div>
            <div class="post-actions">
              <bilingual-action-button
                v-if="canEditPost(post)"
                variant="ghost"
                compact
                type="button"
                :primary-label="t('posts.edit')"
                :secondary-label="peerLocaleText('posts.edit')"
                @click="startEditPost(post)"
              ></bilingual-action-button>
              <bilingual-action-button
                v-if="canEditPost(post)"
                variant="ghost"
                compact
                danger
                type="button"
                :primary-label="t('posts.deleteAction')"
                :secondary-label="peerLocaleText('posts.deleteAction')"
                @click="deletePost(post)"
              ></bilingual-action-button>
              <bilingual-action-button
                variant="ghost"
                compact
                type="button"
                :primary-label="`${post.likedByMe ? t('posts.unlike') : t('posts.like')} · ${post.likesCount}`"
                :secondary-label="`${post.likedByMe ? peerLocaleText('posts.unlike') : peerLocaleText('posts.like')} · ${post.likesCount}`"
                @click="togglePostLike(post)"
              ></bilingual-action-button>
              <bilingual-action-button
                variant="ghost"
                compact
                type="button"
                :primary-label="`${t('posts.share')} · ${post.sharesCount}`"
                :secondary-label="`${peerLocaleText('posts.share')} · ${post.sharesCount}`"
                @click="sharePost(post)"
              ></bilingual-action-button>
              <div class="post-comment-count">{{ t('posts.comment') }} · {{ post.commentsCount }}</div>
            </div>
          </article>
        </div>
      </section>

      <!-- Space overview / 空间概览：仅保留工作台选项卡和空间卡片，进入空间后再展示内容流。 -->
      <section v-if="view === 'space' || view === 'public'" class="panel space-page">
        <div v-if="spaceOwnedExpanded" class="space-workbench">
          <div class="space-workbench-tabs">
            <button
              class="space-tab"
              type="button"
              :class="{ active: spacePanelTab === 'owned' }"
              @click="openSpaceWorkspaceTab('owned')"
            >
              {{ t('spaces.ownedTab') }}
            </button>
            <button
              class="space-tab"
              type="button"
              :class="{ active: spacePanelTab === 'create' }"
              @click="openSpaceWorkspaceTab('create')"
            >
              {{ t('spaces.createTab') }}
            </button>
          </div>
          <div v-if="spacePanelTab === 'owned'" class="space-owned-panel">
            <div v-if="ownedSpaces.length === 0" class="space-tool-sub">{{ t('spaces.pageEmpty') }}</div>
            <div v-else class="space-cards space-cards-inline">
              <div
                class="space-card"
                v-for="space in ownedSpaces"
                :key="space.id"
                :class="{ active: currentSpace && space.id === currentSpace.id }"
              >
                <div class="space-tag" :class="space.type">{{ t(`spaces.type.${space.type}`) }}</div>
                <div v-if="currentSpace && space.id === currentSpace.id" class="space-badge">
                  {{ t('spaces.currentLabel') }}
                </div>
                <div class="space-title">{{ localizedSpaceText('name', space) }}</div>
                <div class="space-desc">{{ localizedSpaceText('desc', space) }}</div>
                <div class="space-meta">{{ spaceVisibilityLabel(space.visibility) }}</div>
                <div class="space-meta">@{{ space.subdomain }}</div>
                <div class="space-card-actions">
                  <bilingual-action-button
                    variant="ghost"
                    compact
                    type="button"
                    :primary-label="t('spaces.enterAction')"
                    :secondary-label="peerLocaleText('spaces.enterAction')"
                    @click="enterSpace(space)"
                  ></bilingual-action-button>
                  <bilingual-action-button
                    variant="ghost"
                    compact
                    type="button"
                    :primary-label="t('spaces.editAction')"
                    :secondary-label="peerLocaleText('spaces.editAction')"
                    @click="openSpaceEditor(space)"
                  ></bilingual-action-button>
                </div>
              </div>
            </div>
          </div>
          <div v-else class="space-tool-card space-create-panel">
            <div class="space-toolbar-kicker">{{ t('spaces.createTitle') }}</div>
            <div class="space-tool-title">{{ t('spaces.createSub') }}</div>
            <div class="space-tool-sub">{{ t('spaces.mySub') }}</div>
            <div class="space-tool-sub">{{ t('spaces.appearanceSub') }}</div>
            <div class="space-tool-actions">
              <bilingual-action-button
                variant="primary"
                type="button"
                :primary-label="t('spaces.createAction')"
                :secondary-label="peerLocaleText('spaces.createAction')"
                @click="openSpaceComposer('public')"
              ></bilingual-action-button>
            </div>
          </div>
        </div>
        <div v-if="currentSpace" class="post-feed">
          <div class="post-composer">
            <div class="post-header">
              <div>
                <h3>{{ t('posts.spaceFeedTitle') }}</h3>
                <p>{{ currentSpace ? t('posts.spaceFeedSub') : t('spaces.pageEmpty') }}</p>
              </div>
              <bilingual-action-button
                v-if="user && currentSpace && currentSpace.userId === user.id"
                variant="primary"
                compact
                type="button"
                :primary-label="t('posts.publishAction')"
                :secondary-label="peerLocaleText('posts.publishAction')"
                @click="openPostComposer(currentSpace)"
              ></bilingual-action-button>
            </div>
            <div v-if="currentSpace" class="post-feed-note">
              {{ user && currentSpace.userId === user.id ? t('posts.creatorHint') : t('posts.viewerHint') }}
            </div>
            <div v-if="currentSpace && currentSpace.userId === user.id" class="space-appearance-strip">
              <div class="space-appearance-card">
                <div class="space-toolbar-kicker">{{ t('spaces.spaceSettingsTitle') }}</div>
                <div class="space-tool-title">{{ t('spaces.appearanceTitle') }}</div>
                <div class="space-tool-sub">{{ t('spaces.spaceSettingsSub') }}</div>
                <div class="space-tool-sub">{{ t('spaces.appearanceSub') }}</div>
                <div class="space-tool-actions">
                  <bilingual-action-button
                    variant="ghost"
                    compact
                    type="button"
                    :primary-label="t('spaces.settingsAction')"
                    :secondary-label="peerLocaleText('spaces.settingsAction')"
                    @click="openSpaceEditor(currentSpace)"
                  ></bilingual-action-button>
                </div>
              </div>
            </div>
          </div>
          <div v-if="currentSpace && activeSpacePosts.length === 0" class="empty-state">{{ t('posts.empty') }}</div>
          <article class="post-card" v-for="post in activeSpacePosts" :key="post.id">
            <div class="post-header">
              <div>
                <div class="post-author">{{ post.authorName }}</div>
                <div class="post-meta">{{ t('posts.spaceLabel') }} · {{ post.spaceLabel }}</div>
                <div class="post-meta">{{ visibilityLabel(post.visibility) }} · {{ formatDateTime(post.createdAt) }}</div>
              </div>
              <bilingual-action-button
                variant="ghost"
                compact
                type="button"
                :primary-label="t('posts.viewAuthor')"
                :secondary-label="peerLocaleText('posts.viewAuthor')"
                @click="openProfile(post.userId, post.authorName)"
              ></bilingual-action-button>
            </div>

                <div v-else class="post-media-card">
                  <div class="post-media-title">{{ editPostDraft.mediaName || t('posts.mediaPreview') }}</div>
                  <div class="post-media-sub">{{ editPostDraft.mediaMime || editPostDraft.mediaType }}</div>
                </div>
              </div>
            </div>
            <bilingual-select-field
              :primary-label="t('posts.visibilityLabel')"
              :secondary-label="peerLocaleText('posts.visibilityLabel')"
              v-model="editPostDraft.visibility"
              :options="postVisibilityOptions()"
            ></bilingual-select-field>
            <bilingual-select-field
              :primary-label="t('posts.statusLabel')"
              :secondary-label="peerLocaleText('posts.statusLabel')"
              v-model="editPostDraft.status"
              :options="postStatusOptions()"
            ></bilingual-select-field>
            <div class="modal-actions">
              <button class="ghost" type="button" @click="closePostEditor">{{ t('common.cancel') }}</button>
              <button class="primary" type="submit">{{ t('posts.editAction') }}</button>
            </div>
          </form>
        </div>
      </div>

      <section v-if="view === 'blockchain'" class="panel">
        <h2>{{ t('blockchain.title') }}</h2>
        <p>{{ t('blockchain.sub') }}</p>
        <div class="search-hint">{{ t('blockchain.securityHint') }}</div>
        <form class="form">
          <bilingual-select-field
            :primary-label="t('blockchain.providerLabel')"
            :secondary-label="peerLocaleText('blockchain.providerLabel')"
            v-model="externalAccountDraft.provider"
            :options="blockchainProviderChoiceOptions()"
          ></bilingual-select-field>
          <bilingual-select-field
            :primary-label="t('blockchain.chainLabel')"
            :secondary-label="peerLocaleText('blockchain.chainLabel')"
            v-model="externalAccountDraft.chain"
            :options="blockchainChainChoiceOptions()"
          ></bilingual-select-field>
          <input type="text" :placeholder="t('blockchain.addressPlaceholder')" v-model="externalAccountDraft.accountAddress" />
          <textarea class="post-textarea" :placeholder="t('blockchain.signaturePlaceholder')" v-model="externalAccountDraft.signaturePayload"></textarea>
          <bilingual-action-button
            variant="primary"
            type="button"
            :primary-label="t('blockchain.bindAction')"
            :secondary-label="peerLocaleText('blockchain.bindAction')"
            @click="bindExternalAccount"
          ></bilingual-action-button>
        </form>
        <div class="friends-grid">
          <div class="friend-card" v-for="account in externalAccounts" :key="account.id">
            <div class="avatar small"></div>
            <div>
              <div class="friend-name">{{ account.provider.toUpperCase() }} <span v-if="account.chain">· {{ account.chain }}</span></div>
              <div class="friend-secondary">{{ account.accountAddress }}</div>
              <div class="friend-status">{{ statusLabel(account.bindingStatus) }}</div>
              <div class="friend-direction">{{ t('blockchain.boundAt') }}: {{ formatDateTime(account.createdAt) }}</div>
            </div>
            <bilingual-action-button
              variant="ghost"
              compact
              danger
              type="button"
              :primary-label="t('blockchain.removeAction')"
              :secondary-label="peerLocaleText('blockchain.removeAction')"
              @click="removeExternalAccount(account)"
            ></bilingual-action-button>
          </div>
        </div>
        <div v-if="externalAccounts.length === 0" class="empty-state">{{ t('blockchain.empty') }}</div>
      </section>

      <section v-if="view === 'friends'" class="panel">
        <h2>{{ t('friends.title') }}</h2>
        <div class="friend-toolbar">
          <input type="text" :placeholder="t('friends.searchPlaceholder')" v-model="newFriendQuery" @keyup.enter="searchUsers" />
          <button class="primary" @click="searchUsers">{{ t('friends.searchAction') }}</button>
        </div>
        <div class="search-hint">{{ t('friends.searchHint') }}</div>
        <div v-if="friendSearchResults.length > 0" class="friends-grid search-results">
          <div class="friend-card" v-for="result in friendSearchResults" :key="result.id">
            <div class="avatar small"></div>
            <div>
              <div class="friend-name">{{ result.name }}</div>
              <div class="friend-secondary">{{ friendSecondary(result) }}</div>
              <div v-if="result.direction" class="friend-direction">{{ directionLabel(result.direction) }}</div>
              <div v-if="result.relationStatus" class="friend-status">{{ statusLabel(result.relationStatus) }}</div>
            </div>
            <button class="ghost" :disabled="searchResultDisabled(result)" @click="addFriend(result)">{{ searchResultActionLabel(result) }}</button>
          </div>
        </div>
        <div v-else-if="friendSearchPerformed" class="empty-state">{{ t('friends.searchEmpty') }}</div>
        <div class="friends-grid">
          <div class="friend-card" v-for="friend in friends" :key="friend.id">
            <div class="avatar small"></div>
            <div>
              <div class="friend-name">{{ friend.name }}</div>
              <div class="friend-secondary">{{ friendSecondary(friend) }}</div>
              <div class="friend-direction">{{ directionLabel(friend.direction) }}</div>
              <div class="friend-status">{{ statusLabel(friend.status) }}</div>
            </div>
            <button v-if="friend.direction === 'incoming' && friend.status === 'pending'" class="ghost" @click="acceptFriend(friend)">{{ t('friends.acceptAction') }}</button>
            <button v-else class="ghost" :disabled="friend.status !== 'accepted'" @click="startChat(friend)">{{ t('friends.chat') }}</button>
          </div>
        </div>
        <div v-if="friends.length === 0" class="empty-state">{{ t('friends.empty') }}</div>
      </section>

      <section v-if="view === 'chat'" class="chat">
        <div class="chat-list">
          <h3>{{ t('chat.title') }}</h3>
          <div class="chat-list-scroll">
            <div class="chat-item" v-for="friend in chatEntries" :key="friend.id" :class="{active: activeChat && activeChat.id === friend.id}" @click="startChat(friend)">
              <div class="avatar small"></div>
              <div>
                <div class="friend-name">{{ friend.name }}</div>
                <div class="friend-secondary">{{ friend.lastMessagePreview || friend.lastMessage || friendSecondary(friend) }}</div>
                <div class="friend-status">{{ friend.lastAt ? formatDateTime(friend.lastAt) : t('chat.latest') }}</div>
                <div v-if="friend.unreadCount" class="friend-direction">{{ t('ws.unreadLabel') }}: {{ friend.unreadCount }}</div>
                <div class="friend-status">{{ statusLabel(friend.status) }}</div>
              </div>
            </div>
          </div>
        </div>
        <div class="chat-window" @click="closeChatQuickPanel">
          <div class="chat-header">
            <div class="chat-header-copy">
              <div class="friend-name">{{ activeChat ? activeChat.name : t('chat.pickFriend') }}</div>
              <div class="friend-status">{{ activeChat ? friendSecondary(activeChat) : t('chat.onlineNow') }}</div>
            </div>
            <div class="chat-header-actions" v-if="activeChat">
              <button class="ghost compact" type="button" @click.stop="openChatFriendProfile(activeChat)">
                {{ t('chat.viewProfile') }}
              </button>
            </div>
          </div>
          <div class="chat-body" ref="chatHistory" @scroll="handleChatHistoryScroll">
            <div class="chat-bubble" v-for="msg in chatMessages" :key="msg.id" :class="msg.from === user.id ? 'me' : 'them'">
              <template v-if="msg.mediaData && msg.messageType === 'image' && msg.mediaUrl">
                <img class="chat-media-image" :src="msg.mediaUrl" :alt="msg.mediaName || t('chat.mediaImage')" @click="openChatAttachment(msg)" />
              </template>
              <template v-else-if="msg.mediaData && msg.messageType === 'video' && msg.mediaUrl">
                <video class="chat-media-video" :src="msg.mediaUrl" controls></video>
              </template>
              <template v-else-if="msg.mediaData && msg.messageType === 'audio' && msg.mediaUrl">
                <audio class="chat-media-audio" :src="msg.mediaUrl" controls></audio>
              </template>
              <div v-else-if="msg.mediaData && msg.messageType !== 'text'" class="chat-media-card">
                <div class="chat-media-title">{{ msg.mediaName || messageMediaLabel(msg) }}</div>
                <div class="chat-media-sub">{{ msg.mediaMime || messageMediaLabel(msg) }}</div>
                <button class="ghost compact" type="button" @click="openChatAttachment(msg)">{{ t('chat.openAttachment') }}</button>
              </div>
              <div v-else-if="isStickerMessage(msg)" class="chat-sticker">{{ localizedMessageContent(msg) }}</div>
              <div v-else-if="localizedMessageContent(msg)" class="chat-text">{{ localizedMessageContent(msg) }}</div>
              <div class="chat-time">{{ msg.time }}</div>
            </div>
            <div v-if="activeChat && chatMessages.length === 0" class="empty-state">{{ t('chat.emptyConversation') }}</div>
            <div v-if="!activeChat" class="empty-state">{{ t('chat.pickFriend') }}</div>
          </div>
          <button
            v-if="activeChat && chatMessages.length > 0 && !chatHistoryAtBottom"
            class="chat-scroll-fab"
            type="button"
            :aria-label="t('chat.backToBottom')"
            @click="scrollChatHistoryToBottom(true)"
          >
            <span class="chat-scroll-fab-icon">↓</span>
            <span class="chat-scroll-fab-text">{{ t('chat.backToBottom') }}</span>
          </button>
          <div class="chat-input">
            <div
              v-if="chatQuickPanelOpen"
              class="chat-quick-panel"
              @click.stop
            >
              <div class="chat-quick-panel-head">
                <div class="chat-quick-panel-copy">
                  <div class="chat-quick-title">{{ t('chat.quickPanelTitle') }}</div>
                  <div class="chat-quick-sub">{{ t('chat.quickPanelHint') }}</div>
                </div>
                <button
                  class="chat-quick-close"
                  type="button"
                  :aria-label="t('chat.quickClose')"
                  :title="t('chat.quickClose')"
                  @click="closeChatQuickPanel"
                >×</button>
              </div>
              <div class="chat-quick-section">
                <div class="chat-quick-section-title">{{ t('chat.quickEmojiTitle') }}</div>
                <div class="chat-quick-grid">
                  <button
                    v-for="quick in chatEmojiSnippets"
                    :key="`emoji-${quick.value}`"
                    class="ghost compact chat-quick-chip emoji"
                    type="button"
                    :title="quick.label"
                    :disabled="!activeChat"
                    @click="insertChatSnippet(quick.value)"
                  >{{ quick.value }}</button>
                </div>
              </div>
              <div class="chat-quick-section">
                <div class="chat-quick-section-title">{{ t('chat.quickStickerTitle') }}</div>
                <div class="chat-quick-grid">
                  <button
                    v-for="quick in chatStickerSnippets"
                    :key="`sticker-${quick.value}`"
                    class="ghost compact chat-quick-chip sticker"
                    type="button"
                    :title="quick.label"
                    :disabled="!activeChat"
                    @click="insertChatSnippet(quick.value)"
                  >{{ quick.value }}</button>
                </div>
              </div>
            </div>
            <div class="chat-toolbar">
              <button class="ghost compact" type="button" :disabled="!activeChat" @click.stop="toggleChatQuickPanel">
                {{ chatQuickPanelOpen ? t('chat.quickClose') : t('chat.quickToggle') }}
              </button>
              <button class="ghost compact" type="button" @click="pickChatAttachment('image')">{{ t('chat.attachImage') }}</button>
              <button class="ghost compact" type="button" @click="pickChatAttachment('video')">{{ t('chat.attachVideo') }}</button>
              <button class="ghost compact" type="button" @click="pickChatAttachment('audio')">{{ t('chat.attachAudio') }}</button>
              <button v-if="chatAttachment" class="ghost compact" type="button" @click="clearChatAttachment">{{ t('chat.clearAttachment') }}</button>
            </div>
            <div v-if="chatAttachment" class="chat-attachment">
              <div class="chat-attachment-icon">⧉</div>
              <div class="chat-attachment-body">
                <div class="chat-attachment-title">{{ chatAttachment.mediaName }}</div>
                <div class="chat-attachment-sub">
                  {{ messageMediaLabel(chatAttachment) }} · {{ formatByteSize(chatAttachment.originalSizeBytes) }} · {{ t('chat.attachmentHint') }}
                </div>
              </div>
            </div>
            <div class="chat-compose">
              <input ref="chatInput" type="text" :placeholder="t('chat.inputPlaceholder')" v-model="chatInput" :disabled="!activeChat" @keyup.enter="sendMessage" />
              <button class="primary" type="button" @click="sendMessage">{{ t('chat.send') }}</button>
            </div>
          </div>
        </div>
      </section>

      <div v-if="chatFriendProfile" class="modal-backdrop" @click.self="closeChatFriendProfile">
        <div class="modal chat-profile-modal">
          <div class="modal-header">
            <div>
              <div class="space-toolbar-kicker">{{ t('chat.friendProfileTitle') }}</div>
              <div class="modal-title">{{ chatFriendProfile.name }}</div>
              <div class="modal-hint">{{ t('chat.friendProfileSub') }}</div>
            </div>
            <button class="ghost compact" type="button" @click="closeChatFriendProfile">×</button>
          </div>
          <div class="friend-profile-summary">
            <div class="avatar large"></div>
            <div class="friend-profile-summary-copy">
              <div class="friend-name">{{ chatFriendProfile.name }}</div>
              <div class="friend-secondary">{{ friendSecondary(chatFriendProfile) }}</div>
              <div class="friend-status">{{ statusLabel(chatFriendProfile.status) }} · {{ directionLabel(chatFriendProfile.direction) }}</div>
            </div>
          </div>
          <div class="friend-profile-grid">
            <div v-for="item in friendProfileRows(chatFriendProfile)" :key="item.key" class="friend-profile-card">
              <div class="friend-profile-label">{{ item.label }}</div>
              <div class="friend-profile-value">{{ item.value }}</div>
            </div>
          </div>
          <div class="space-section">
            <div class="space-section-head">
              <h3>{{ t('chat.friendSpacesTitle') }}</h3>
              <p>{{ t('chat.friendSpacesSub') }}</p>
            </div>
            <div v-if="chatFriendSpaces.length === 0" class="empty-state">{{ t('chat.friendSpacesEmpty') }}</div>
            <div class="space-cards">
              <div
                class="space-card"
                v-for="space in chatFriendSpaces"
                :key="space.id"
              >
                <div class="space-tag public">{{ spaceVisibilityLabel(space.visibility) }}</div>
                <div class="space-title">{{ localizedSpaceText('name', space) }}</div>
                <div class="space-desc">{{ localizedSpaceText('desc', space) }}</div>
                <div class="space-meta">@{{ space.subdomain }}</div>
                <div class="space-card-actions">
                  <bilingual-action-button
                    variant="ghost"
                    compact
                    type="button"
                    :primary-label="t('spaces.enterAction')"
                    :secondary-label="peerLocaleText('spaces.enterAction')"
                    @click="enterSpace(space)"
                  ></bilingual-action-button>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-actions">
            <button class="ghost" type="button" @click="closeChatFriendProfile">{{ t('common.cancel') }}</button>
            <button class="primary" type="button" @click="openChatFriendProfilePage">{{ t('chat.viewProfile') }}</button>
          </div>
        </div>
      </div>

      <div v-if="spaceModalOpen" class="modal-backdrop" @click.self="closeSpaceComposer">
        <div class="modal">
          <div class="modal-header">
            <div>
              <div class="space-toolbar-kicker">
                {{ spaceDraft.id ? t('spaces.editTitle') : t('spaces.createTitle') }}
              </div>
              <div class="modal-title">
                {{ spaceDraft.id ? t('spaces.editSub') : t('spaces.createSub') }}
              </div>
            </div>
            <button class="ghost compact" type="button" @click="closeSpaceComposer">×</button>
          </div>
          <form class="form modal-form" @submit.prevent="createSpace">
              <bilingual-select-field
                :primary-label="t('spaces.typeLabel')"
                :secondary-label="peerLocaleText('spaces.typeLabel')"
                v-model="spaceDraft.type"
                :disabled="Boolean(spaceDraft.id)"
                :options="spaceTypeOptions()"
                @change="syncSpaceDraftVisibility($event); !spaceDraft.id && (spaceDraft.subdomain = spaceDraft.subdomain.trim() || suggestSpaceSubdomain(spaceDraft.name, $event))"
              ></bilingual-select-field>
              <bilingual-select-field
                :primary-label="t('spaces.visibilityLabel')"
                :secondary-label="peerLocaleText('spaces.visibilityLabel')"
                v-model="spaceDraft.visibility"
                :disabled="spaceDraft.type === 'private'"
                :options="spaceVisibilityOptions()"
              ></bilingual-select-field>
            <input
              type="text"
              :placeholder="t('spaces.namePlaceholder')"
              v-model="spaceDraft.name"
              @input="!spaceDraft.id && (spaceDraft.subdomain = spaceDraft.subdomain.trim() || suggestSpaceSubdomain(spaceDraft.name, spaceDraft.type))"
            />
            <input type="text" :placeholder="t('spaces.subdomainLabel')" v-model="spaceDraft.subdomain" maxlength="63" />
            <div class="modal-hint">
              {{ spaceDraft.id ? t('spaces.subdomainEditHint') : t('spaces.subdomainHint') }}
            </div>
            <textarea class="post-textarea" :placeholder="t('spaces.descPlaceholder')" v-model="spaceDraft.description"></textarea>
            <div class="modal-actions">
              <button class="ghost" type="button" @click="closeSpaceComposer">{{ t('common.cancel') }}</button>
              <button class="primary" type="submit">
                {{ spaceDraft.id ? t('spaces.saveAction') : t('spaces.createAction') }}
              </button>
            </div>
          </form>
        </div>
      </div>

      <div v-if="postModalOpen" class="modal-backdrop" @click.self="closePostComposer">
        <div class="modal">
          <div class="modal-header">
            <div>
              <div class="space-toolbar-kicker">{{ t('posts.publishAction') }}</div>
              <div class="modal-title">
                {{ postDraft.visibility === 'private' ? t('posts.privateFeedTitle') : t('posts.feedTitle') }}
              </div>
            </div>
            <button class="ghost compact" type="button" @click="closePostComposer">×</button>
          </div>
          <form class="form modal-form" @submit.prevent="createPost">
              <bilingual-select-field
                :primary-label="t('posts.visibilityLabel')"
                :secondary-label="peerLocaleText('posts.visibilityLabel')"
                v-model="postDraft.visibility"
                :options="postVisibilityOptions()"
              @change="postDraft.spaceId = managedSpaceIdForVisibility($event, postDraft.spaceId)"
              ></bilingual-select-field>
            <bilingual-select-field
              :primary-label="t('posts.spaceLabel')"
              :secondary-label="peerLocaleText('posts.spaceLabel')"
              v-model="postDraft.spaceId"
              :options="spaceOptions(postDraft.visibility === 'private' ? privateSpaces : publicSpaces)"
            ></bilingual-select-field>
            <input type="text" :placeholder="t('posts.titlePlaceholder')" v-model="postDraft.title" />
            <textarea class="post-textarea" :placeholder="t('posts.contentPlaceholder')" v-model="postDraft.content"></textarea>
            <div class="post-media-tools">
              <div class="post-media-tools-head">
                <div class="post-media-tools-title">{{ t('posts.mediaPreview') }}</div>
                <div class="post-media-tools-sub">{{ postDraft.mediaName || t('common.notAvailable') }}</div>
              </div>
              <div class="post-media-actions">
                <bilingual-action-button
                  variant="ghost"
                  compact
                  type="button"
                  :primary-label="t('posts.attachImage')"
                  :secondary-label="peerLocaleText('posts.attachImage')"
                  @click="pickPostMedia('create', 'image')"
                ></bilingual-action-button>
                <bilingual-action-button
                  variant="ghost"
                  compact
                  type="button"
                  :primary-label="t('posts.attachVideo')"
                  :secondary-label="peerLocaleText('posts.attachVideo')"
                  @click="pickPostMedia('create', 'video')"
                ></bilingual-action-button>
                <bilingual-action-button
                  v-if="postDraft.mediaUrl"
                  variant="ghost"
                  compact
                  danger
                  type="button"
                  :primary-label="t('posts.clearMedia')"
                  :secondary-label="peerLocaleText('posts.clearMedia')"
                  @click="clearPostMedia('create')"
                ></bilingual-action-button>
              </div>
              <div v-if="postDraft.mediaUrl" class="post-media-preview">
                <img
                  v-if="postDraft.mediaType === 'image'"
                  :src="postDraft.mediaUrl"
                  :alt="postDraft.mediaName || postDraft.title"
                />
                <video
                  v-else-if="postDraft.mediaType === 'video'"
                  :src="postDraft.mediaUrl"
                  controls
                ></video>
                <div v-else class="post-media-card">
                  <div class="post-media-title">{{ postDraft.mediaName || t('posts.mediaPreview') }}</div>
                  <div class="post-media-sub">{{ postDraft.mediaMime || postDraft.mediaType }}</div>
                </div>
              </div>
            </div>
            <bilingual-select-field
              :primary-label="t('posts.statusLabel')"
              :secondary-label="peerLocaleText('posts.statusLabel')"
              v-model="postDraft.status"
              :options="postStatusOptions()"
            ></bilingual-select-field>
            <div class="modal-actions">
              <button class="ghost" type="button" @click="closePostComposer">{{ t('common.cancel') }}</button>
              <button class="primary" type="submit">{{ t('posts.publishAction') }}</button>
            </div>
          </form>
        </div>
      </div>
    </main>
    </template>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="components/settings-menu.js"></script>
  <script src="components/auth-panel.js"></script>
  <script src="components/landing-page.js"></script>
  <script src="components/bilingual-field.js"></script>
  <script src="components/bilingual-select-field.js"></script>
  <script src="components/bilingual-action-button.js"></script>
  <script src="app.js"></script>
</body>
</html>
